name: Build MacCleanerPro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x build_app.sh

      - name: Build
        run: ./build_app.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MacCleanerPro
          path: dist/
