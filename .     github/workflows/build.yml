name: Build MacCleanerPro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build App
        run: chmod +x build_app.sh && ./build_app.sh

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: MacCleanerPro-Build
          path: dist/
